<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <aside class="navbar" id="navbar">
        <div class="navbar-header">
            <h2>Portfolio</h2>
        </div>
        <nav>
            <a href="#acceuil">Accueil</a>
            <a href="#about">About Me</a>
            <a href="#projects">My Projects</a>
        </nav>
    </aside>

    <!-- Toggle button OUTSIDE sidebar -->
    <button class="toggle-btn" id="toggle-btn">☰</button>

    <!-- Main Content -->
    <main class="content">
        <section id="acceuil" class="hero">
            <video autoplay muted loop playsinline class="background-video">
            <source src="./Assets/background.mp4" type="video/mp4">
            Ce navigateur ne supporte pas la vidéo en arrière-plan.
            </video>
            <div class="hero-overlay">
                <h1>Bienvenue sur mon Portfolio</h1>
            </div>
        </section>

        <!-- About Me (wraps both passions) -->
        <section id="about" class="section-container big-section">
            <div class="row">
                <img src="./Assets/code.jpg" alt="Code">
                <p>Ma première passion, le code.</p>
            </div>
            <div class="row reverse">
                <img src="./Assets/pole.jpg" alt="Saut à la perche">
                <p>Ainsi que la deuxième, le saut à la perche.</p>
            </div>
        </section>

        <!-- Projects -->
        <section id="projects" class="section-container big-section">
            <h1>Projects</h1>
            <p>BlaBlaBla — mes projets à découvrir ici !</p>
        </section>


    </main>

    <!-- JavaScript at END of body -->
    <script src="script.js"></script>
</body>
</html>
